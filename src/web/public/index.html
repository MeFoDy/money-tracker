<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Money Tracker — личный финансовый дашборд для отслеживания доходов, расходов и анализа транзакций.">
  <meta property="og:title" content="Money Tracker">
  <meta property="og:description" content="Личный финансовый дашборд для отслеживания доходов, расходов и анализа транзакций.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E◈%3C/text%3E%3C/svg%3E">
  <title>Money Tracker</title>
  <link rel="stylesheet" href="./vendor/pico.css" integrity="sha384-L1dWfspMTHU/ApYnFiMz2QID/PlP1xCW9visvBdbEkOLkSSWsP6ZJWhPw6apiXxU" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <script defer src="./vendor/chart.js" integrity="sha384-hfkuqrKeWFmnTMWN31VWyoe8xgdTADD11kgxmdpx2uyE6j5Az5uZq6u6AKYYmAOw" crossorigin="anonymous"></script>
  <script defer src="./vendor/chartjs-plugin-datalabels.js" integrity="sha384-y49Zu59jZHJL/PLKgZPv3k2WI9c0Yp3pWB76V8OBVCb0QBKS8l4Ff3YslzHVX76Y" crossorigin="anonymous"></script>
  <script type="module" src="./js/app.js"></script>
  <script defer src="./vendor/alpine-focus.js" integrity="sha384-ysJcnHb6oCzqAGKdoTm+IqKqmPKgxHT+ApZCawkyWOJfMq15WvzW3RRmHl7tWpEY" crossorigin="anonymous"></script>
  <script defer src="./vendor/alpinejs.js" integrity="sha384-pb6hrQvo4s23cEUFtj0CZkzGE3jyK3pj26RIupXXxhSrrcUA/Cn0lZgcCrGH0t6L" crossorigin="anonymous"></script>
</head>

<body>
  <div x-data="app()" x-init="initApp()">
    <nav class="container-fluid">
      <ul>
        <li class="brand"><span class="logo">◈</span> <strong>Money Tracker</strong></li>
      </ul>
      <ul>
        <li><a href="?page=dashboard" @click.prevent="navigateTo('dashboard')" :class="{ 'active': page==='dashboard' }">Сводка</a></li>
        <li><a href="?page=transactions" @click.prevent="navigateTo('transactions')" :class="{ 'active': page==='transactions' }">Транзакции</a></li>
        <li><a href="?page=categories" @click.prevent="navigateTo('categories')" :class="{ 'active': page==='categories' }">Категории</a></li>
        <li><a href="?page=accounts" @click.prevent="navigateTo('accounts')" :class="{ 'active': page==='accounts' }">Счета</a></li>
        <li><a href="?page=upload" @click.prevent="navigateTo('upload')" :class="{ 'active': page==='upload' }">Загрузить</a></li>
      </ul>
    </nav>

    <main class="container">
      <div class="loading-overlay" x-show="isLoading" x-transition.opacity.duration.200ms>
        <span class="spinner" aria-label="Загрузка"></span>
      </div>
      <!-- Dashboard -->
      <template x-if="page === 'dashboard'">
        <div>
          <!-- Dashboard Filters -->
          <div class="dashboard-filters">
            <!-- Row 1: Date inputs + Period radios -->
            <div class="filter-row filter-row-dates">
              <input type="date" x-model="dashFilters.from" @change="onDashDateChange()" placeholder="От">
              <input type="date" x-model="dashFilters.to" @change="onDashDateChange()" placeholder="До">

              <label class="visually-hidden" for="dash-account">Счёт</label>
              <select id="dash-account" x-model="dashFilters.accountId" x-effect="accounts.length; $nextTick(() => { $el.value = dashFilters.accountId })" @change="onDashAccountChange()">
                <option value="">Все счета</option>
                <template x-for="acc in accounts" :key="acc.id">
                  <option :value="acc.id" x-text="accLabel(acc)"></option>
                </template>
              </select>
              <div class="multi-select-wrap" @click.window="if (!$event.target.closest('.multi-select-wrap')) categoryDropdownOpen = false">
                <button type="button" @click="toggleCategoryDropdown()" :aria-expanded="categoryDropdownOpen" aria-haspopup="true" aria-controls="category-dropdown">
                  <span x-text="dashFilters.categoryIds.length ? `Категорий: ${dashFilters.categoryIds.length}` : 'Все категории'"></span>
                </button>
                <div id="category-dropdown" class="multi-select-dropdown" :class="{ 'open': categoryDropdownOpen }">
                  <label class="multi-select-item">
                    <input type="checkbox" value="null" x-model="dashFilters.categoryIds" @change="onDashCategoryChange()">
                    <span class="color-swatch small" style="background-color: #888888"></span>
                    <span>Без категории</span>
                  </label>
                  <template x-for="cat in categories" :key="cat.id">
                    <label class="multi-select-item">
                      <input type="checkbox" :value="String(cat.id)" x-model="dashFilters.categoryIds" @change="onDashCategoryChange()">
                      <span class="color-swatch small" :style="'background-color: ' + (cat.color || '#cccccc')"></span>
                      <span x-text="cat.name"></span>
                    </label>
                  </template>
                </div>
              </div>
              <button class="outline" @click="resetDashFilters()">Сбросить</button>

              <div class="period-radios" role="group">
                <label :class="{ 'active': dashFilters.period === 'month' }">
                  <input type="radio" value="month" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>Месяц</span>
                </label>
                <label :class="{ 'active': dashFilters.period === '3months' }">
                  <input type="radio" value="3months" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>3 месяца</span>
                </label>
                <label :class="{ 'active': dashFilters.period === 'all' }">
                  <input type="radio" value="all" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>Всё время</span>
                </label>
                <label :class="{ 'active': dashFilters.period === 'custom' }">
                  <input type="radio" value="custom" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>Свой</span>
                </label>
              </div>
            </div>
          </div>

          <!-- KPI Cards -->
          <div class="grid kpi-cards">
            <article class="card-glow kpi-card" @click="toggleLineDataset('balance')">
              <header>
                <h5>Прибыль</h5>
              </header>
              <p class="big" :class="kpi.balance >= 0 ? 'income' : 'expense'" x-text="formatMoney(kpi.balance)"></p>
            </article>
            <article class="card-glow kpi-card" :class="{ 'income-border': !lineHidden.income }" @click="toggleLineDataset('income')">
              <header>
                <h5>Доходы</h5>
              </header>
              <p class="big income" x-text="formatMoney(kpi.income)"></p>
              <p class="kpi-delta" :class="kpi.incomeDelta >= 0 ? 'delta-positive' : 'delta-negative'">
                <span x-text="kpi.incomeDelta >= 0 ? '↑' : '↓'"></span>
                <span x-text="Math.abs(kpi.incomeDeltaPercent) + '%'"></span>
              </p>
              <p class="kpi-prev" x-show="kpi.prevPeriod" x-text="'в сравнении с ' + kpi.prevPeriod?.from + ' — ' + kpi.prevPeriod?.to"></p>
            </article>
            <article class="card-glow kpi-card" :class="{ 'expense-border': !lineHidden.expense }" @click="toggleLineDataset('expense')">
              <header>
                <h5>Расходы</h5>
              </header>
              <p class="big expense" x-text="formatMoney(kpi.expense)"></p>
              <p class="kpi-delta" :class="kpi.expenseDelta >= 0 ? 'delta-negative' : 'delta-positive'">
                <span x-text="kpi.expenseDelta >= 0 ? '↑' : '↓'"></span>
                <span x-text="Math.abs(kpi.expenseDeltaPercent) + '%'"></span>
              </p>
              <p class="kpi-prev" x-show="kpi.prevPeriod" x-text="'в сравнении с ' + formatDate(kpi.prevPeriod?.from) + ' — ' + formatDate(kpi.prevPeriod?.to)"></p>
            </article>
            <article class="card-glow kpi-card" @click="highlightTopCategory()">
              <header>
                <h5>Топ-категория</h5>
              </header>
              <p class="big expense" x-text="formatMoney(kpi.topCategory?.total || 0)"></p>
              <p class="kpi-label" x-text="kpi.topCategory?.name || '—'"></p>
            </article>
            <article class="card-glow kpi-card">
              <header>
                <h5>Операций</h5>
              </header>
              <p class="big" x-text="formatNum(kpi.transactionCount)"></p>
            </article>
          </div>

          <!-- Line Chart -->
          <article class="chart-card chart-card-wide">
            <header class="chart-header">
              <h5>Доходы и расходы</h5>
            </header>
            <div class="group-tabs" role="group">
              <button :class="{ 'active': groupBy === 'day' }" @click="setGroupBy('day')">Дни</button>
              <button :class="{ 'active': groupBy === 'week' }" @click="setGroupBy('week')">Недели</button>
              <button :class="{ 'active': groupBy === 'month' }" @click="setGroupBy('month')">Месяцы</button>
            </div>
            <div class="chart-wrap chart-wrap-tall"><canvas id="chart-income-expense"></canvas></div>
          </article>

          <!-- Category Doughnut -->
          <article class="chart-card chart-card-wide">
            <header>
              <h5>Расходы по категориям (всего: <span x-text="formatMoney(kpi.expense)"></span>)</h5>
            </header>
            <div class="chart-wrap"><canvas id="chart-categories"></canvas></div>
          </article>

          <!-- Heatmap -->
          <article class="chart-card chart-card-wide">
            <header class="chart-header">
              <h5>Тепловая карта</h5>
            </header>
            <div class="group-tabs" role="group">
              <button :class="{ 'active': heatmapMode === 'expense' }" @click="setHeatmapMode('expense')">Расходы</button>
              <button :class="{ 'active': heatmapMode === 'income' }" @click="setHeatmapMode('income')">Доходы</button>
              <button :class="{ 'active': heatmapMode === 'count' }" @click="setHeatmapMode('count')">Количество</button>
            </div>
            <div class="chart-wrap heatmap-wrap">
              <div id="heatmap-grid" class="heatmap-grid"></div>
            </div>
          </article>

          <!-- Period Comparison Chart -->
          <article class="chart-card chart-card-wide">
            <header>
              <h5>Сравнение с предыдущим периодом</h5>
            </header>
            <div class="chart-wrap chart-wrap-tall"><canvas id="chart-comparison"></canvas></div>
          </article>
        </div>
      </template>

      <!-- Transactions -->
      <template x-if="page === 'transactions'">
        <div @click.window="if (!$event.target.closest('.tx-actions-menu')) txMenuOpen = null">
          <h3 class="page-title">Транзакции</h3>
          <div class="grid summary-cards">
            <article class="card-glow income-border">
              <header>
                <h4>Доходы</h4>
              </header>
              <p class="big income" x-text="formatMoney(periodStats.income)"></p>
            </article>
            <article class="card-glow expense-border">
              <header>
                <h4>Расходы</h4>
              </header>
              <p class="big expense" x-text="formatMoney(periodStats.expense)"></p>
            </article>
            <article class="card-glow">
              <header>
                <h4>Прибыль</h4>
              </header>
              <p class="big" x-text="formatMoney((periodStats.income || 0) - (periodStats.expense || 0))"></p>
            </article>
          </div>
          <div class="filter-row filter-row-transactions grid">
            <input type="date" x-model="filters.from" @change="onTransactionDateChange()" placeholder="От">
            <input type="date" x-model="filters.to" @change="onTransactionDateChange()" placeholder="До">
            <select x-model="filters.accountId" x-effect="accounts.length; $nextTick(() => { $el.value = filters.accountId })" @change="onTransactionAccountChange()">
              <option value="">Все счета</option>
              <template x-for="acc in accounts" :key="acc.id">
                <option :value="acc.id" x-text="accLabel(acc)"></option>
              </template>
            </select>
            <div class="multi-select-wrap" @click.window="if (!$event.target.closest('.multi-select-wrap')) txCategoryDropdownOpen = false">
              <button type="button" @click="txCategoryDropdownOpen = !txCategoryDropdownOpen" :aria-expanded="txCategoryDropdownOpen" aria-haspopup="true" aria-controls="tx-category-dropdown">
                <span x-text="filters.categoryIds.length ? `Категорий: ${filters.categoryIds.length}` : 'Все категории'"></span>
              </button>
              <div id="tx-category-dropdown" class="multi-select-dropdown" :class="{ 'open': txCategoryDropdownOpen }">
                <label class="multi-select-item">
                  <input type="checkbox" value="null" x-model="filters.categoryIds" @change="onTransactionCategoryChange()">
                  <span class="color-swatch small" style="background-color: #888888"></span>
                  <span>Без категории</span>
                </label>
                <template x-for="cat in categories" :key="cat.id">
                  <label class="multi-select-item">
                    <input type="checkbox" :value="String(cat.id)" x-model="filters.categoryIds" @change="onTransactionCategoryChange()">
                    <span class="color-swatch small" :style="'background-color: ' + (cat.color || '#cccccc')"></span>
                    <span x-text="cat.name"></span>
                  </label>
                </template>
              </div>
            </div>
            <input type="text" x-model="filters.search" @input.debounce.300ms="loadTransactions()" placeholder="Поиск по описанию...">
            <button class="secondary outline" @click="resetFilters()">Сбросить</button>
          </div>

          <div class="bulk-bar" x-show="selectedIds.length > 0">
            <span x-text="'Выбрано: ' + selectedIds.length"></span>
            <select x-model="bulkCategoryId">
              <option value="">Выберите категорию</option>
              <template x-for="cat in categories" :key="cat.id">
                <option :value="cat.id" x-text="cat.name"></option>
              </template>
            </select>
            <button @click="applyBulkCategory()" :disabled="!bulkCategoryId">Назначить</button>
          </div>

          <figure class="data-table-wrap">
            <table role="grid" class="data-table">
              <thead>
                <tr>
                  <th><input type="checkbox" @change="toggleSelectAll($event.target.checked)"></th>
                  <th>Дата</th>
                  <th>Описание</th>
                  <th>Сумма</th>
                  <th>Валюта</th>
                  <th>Счет</th>
                  <th>Категория</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="tx in transactions.rows" :key="tx.id">
                  <tr>
                    <td><input type="checkbox" :value="tx.id" x-model="selectedIds"></td>
                    <td x-text="formatDate(tx.tx_date)"></td>
                    <td x-text="tx.description"></td>
                    <td :class="tx.is_pending ? 'pending' : tx.tx_type" x-text="formatMoney(tx.amount, tx.currency)"></td>
                    <td x-text="tx.currency"></td>
                    <td>
                      <span class="account-chip" x-text="accountMap[tx.account_id]?.account_number || '#'+tx.account_id" @mouseenter="showAccTooltip($event, tx.account_id)" @mousemove="_positionTooltip($refs.accTooltip, $event)" @mouseleave="hideAccTooltip()"></span>
                    </td>
                    <td>
                      <select x-model="tx.category_id" @change="updateTxCategory(tx.id, $event.target.value)">
                        <option value="">—</option>
                        <template x-for="cat in categories" :key="cat.id">
                          <option :value="cat.id" x-text="cat.name" :selected="cat.id == tx.category_id"></option>
                        </template>
                      </select>
                    </td>
                    <td class="actions-cell">
                      <div class="tx-actions-menu">
                        <button class="secondary outline square" @click="txMenuOpen = txMenuOpen === tx.id ? null : tx.id" aria-label="Действия">⋮</button>
                        <div class="tx-actions-dropdown" :class="{ 'open': txMenuOpen === tx.id }">
                          <button type="button" @click="openRuleDrawerFromTransaction(tx); txMenuOpen = null">Создать правило</button>
                          <button type="button" class="danger" @click="deleteTx(tx.id); txMenuOpen = null">Удалить</button>
                        </div>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
        </div>
        </figure>

        <div class="pagination">
          <button class="outline" @click="prevPage()" :disabled="transactions.offset <= 0">← Назад</button>
          <span x-text="(transactions.offset||0)+1 + ' — ' + Math.min((transactions.offset||0)+(transactions.limit||50), transactions.total) + ' из ' + transactions.total"></span>
          <button class="outline" @click="nextPage()" :disabled="(transactions.offset||0)+(transactions.limit||50) >= transactions.total">Вперед →</button>
        </div>
  </div>
  </template>

  <!-- Categories -->
  <template x-if="page === 'categories'">
    <div>
      <h3 class="page-title">Категории</h3>
      <div class="category-form">
        <input type="text" x-model="newCategoryName" placeholder="Название новой категории">
        <div class="color-palette">
          <template x-for="c in categoryColors" :key="c.value">
            <button type="button" class="color-swatch" :class="{ 'active': newCategoryColor === c.value }" :style="'background-color: ' + c.value" :title="c.name" @click="newCategoryColor = c.value"></button>
          </template>
        </div>
        <button @click="addCategory()">Добавить</button>
      </div>
      <figure class="data-table-wrap category-table-wrap">
        <div class="data-table-scroll">
          <table role="grid" class="data-table category-table">
            <thead>
              <tr>
                <th>Цвет</th>
                <th>Название</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="cat in categories" :key="cat.id">
                <tr>
                  <td>
                    <div class="color-palette">
                      <template x-for="c in categoryColors" :key="c.value">
                        <button type="button" class="color-swatch small" :class="{ 'active': (cat.color || '#cccccc') === c.value }" :style="'background-color: ' + c.value" :title="c.name" @click="updateCategoryColor(cat.id, c.value)"></button>
                      </template>
                    </div>
                  </td>
                  <td x-text="cat.name"></td>
                  <td><button class="secondary outline square small" @click="deleteCategory(cat.id)">×</button></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </figure>

      <h4 class="page-title">Правила авто-категоризации</h4>
      <div class="rule-toolbar">
        <button @click="openRuleDrawer()">Добавить правило</button>
      </div>

      <figure class="data-table-wrap">
        <div class="data-table-scroll">
          <table role="grid" class="data-table">
            <thead>
              <tr>
                <th>Категория</th>
                <th>Описание</th>
                <th>Сумма</th>
                <th>Счёт</th>
                <th>Валюта</th>
                <th>Приоритет</th>
                <th>Активно</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="rule in categoryRules" :key="rule.id">
                <tr>
                  <td>
                    <span class="category-badge" :style="'background-color: ' + (categoryMap[rule.categoryId]?.color || '#555')" x-text="rule.categoryName || categoryMap[rule.categoryId]?.name || '—'"></span>
                  </td>
                  <td x-text="rule.descriptionPattern || '—'"></td>
                  <td>
                    <span x-show="rule.minAmount !== null || rule.maxAmount !== null">
                      <span x-show="rule.minAmount !== null" x-text="'≥ ' + formatMoney(rule.minAmount)"></span>
                      <span x-show="rule.minAmount !== null && rule.maxAmount !== null">, </span>
                      <span x-show="rule.maxAmount !== null" x-text="'≤ ' + formatMoney(rule.maxAmount)"></span>
                    </span>
                    <span x-show="rule.minAmount === null && rule.maxAmount === null">—</span>
                  </td>
                  <td x-text="rule.accountName || rule.accountNumber || 'Любой'"></td>
                  <td x-text="rule.currency || 'Любая'"></td>
                  <td x-text="rule.priority"></td>
                  <td>
                    <input type="checkbox" :checked="rule.isActive" @change="toggleRuleActive(rule)">
                  </td>
                  <td class="actions-cell">
                    <button class="secondary outline square" @click="openRuleDrawer(rule)" title="Редактировать">✎</button>
                    <button class="secondary outline square" @click="deleteCategoryRule(rule.id)" title="Удалить">×</button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </figure>
    </div>
  </template>

  <!-- Accounts -->
  <template x-if="page === 'accounts'">
    <div>
      <h3 class="page-title">Счета</h3>
      <figure class="data-table-wrap">
        <table role="grid" class="data-table accounts-table">
          <thead>
            <tr>
              <th>Номер счёта</th>
              <th>Название из выписки</th>
              <th>Валюта</th>
              <th>Комментарий</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="acc in accounts" :key="acc.id">
              <tr>
                <td x-text="acc.account_number"></td>
                <td x-text="acc.name || '—'"></td>
                <td x-text="acc.currency"></td>
                <td>
                  <template x-if="accountEdit.id !== acc.id">
                    <span class="account-comment-text" @click="startEditAccount(acc)" :title="acc.comment ? '' : 'Нажмите, чтобы добавить комментарий'" x-text="acc.comment || ''"></span>
                  </template>
                  <template x-if="accountEdit.id === acc.id">
                    <input type="text" class="account-comment-input" x-model="accountEdit.comment" placeholder="Комментарий..." @keydown.enter="saveAccountComment(acc)" @keydown.escape="cancelEditAccount()" x-init="$nextTick(() => $el.focus())">
                  </template>
                </td>
                <td class="actions-cell">
                  <template x-if="accountEdit.id === acc.id">
                    <span>
                      <button class="outline small" @click="saveAccountComment(acc)">Сохранить</button>
                      <button class="secondary outline small" @click="cancelEditAccount()">Отмена</button>
                    </span>
                  </template>
                  <template x-if="accountEdit.id !== acc.id">
                    <button class="secondary outline square small" @click="startEditAccount(acc)" title="Редактировать комментарий">✎</button>
                  </template>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </figure>
    </div>
  </template>

  <!-- Upload -->
  <template x-if="page === 'upload'">
    <div>
      <h3 class="page-title">Загрузка выписки</h3>
      <div class="dropzone" @dragover.prevent @drop.prevent="handleDrop($event)" @click="$refs.fileInput.click()">
        <p class="dropzone-icon">⬆</p>
        <p>Перетащите CSV-файл сюда или кликните для выбора</p>
        <input type="file" accept=".csv" x-ref="fileInput" @change="handleFileSelect($event)" class="hidden">
      </div>

      <!-- Preview Mode -->
      <template x-if="isPreviewMode">
        <div>
          <article class="upload-result">
            <header>Предпросмотр импорта</header>
            <div class="grid result-grid">
              <div class="result-item">
                <span class="result-label">Новых транзакций</span>
                <span class="result-value" x-text="uploadPreview.stats.newCount"></span>
              </div>
              <div class="result-item">
                <span class="result-label">Дублей (будет пропущено)</span>
                <span class="result-value" x-text="uploadPreview.stats.duplicateCount"></span>
              </div>
            </div>
          </article>

          <figure class="data-table-wrap">
            <div class="data-table-scroll">
              <table role="grid" class="data-table">
                <thead>
                  <tr>
                    <th>Дата</th>
                    <th>Сумма</th>
                    <th>Валюта</th>
                    <th>Счет</th>
                    <th>Описание</th>
                    <th>Категория</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(tx, index) in uploadPreview.transactions" :key="index">
                    <tr :class="{ 'auto-categorized': tx.appliedRuleId }">
                      <td x-text="formatDate(tx.txDate)"></td>
                      <td :class="tx.isPending ? 'pending' : tx.txType" x-text="formatMoney(tx.amount, tx.currency)"></td>
                      <td x-text="tx.currency"></td>
                      <td x-text="accountMap[tx.accountId]?.account_number || '#'+tx.accountId"></td>
                      <td x-text="tx.description"></td>
                      <td>
                        <select x-model="tx.finalCategoryId" @change="updatePreviewCategory(index, $event.target.value)">
                          <option value="">—</option>
                          <template x-for="cat in categories" :key="cat.id">
                            <option :value="cat.id" x-text="cat.name" :selected="cat.id == tx.finalCategoryId"></option>
                          </template>
                        </select>
                        <span x-show="tx.appliedRuleId" class="auto-badge" title="Автоматически переразмечено правилом">Авто</span>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </figure>

          <div class="preview-actions">
            <button @click="confirmUpload()">Сохранить</button>
            <button class="outline" @click="cancelUpload()">Отмена</button>
          </div>
        </div>
      </template>

      <!-- Result Mode -->
      <template x-if="!isPreviewMode && uploadResult">
        <article class="upload-result">
          <header>Результат импорта</header>
          <div class="grid result-grid">
            <div class="result-item">
              <span class="result-label">Импортировано</span>
              <span class="result-value" x-text="uploadResult.imported"></span>
            </div>
            <div class="result-item">
              <span class="result-label">Пропущено дублей</span>
              <span class="result-value" x-text="uploadResult.duplicatesSkipped"></span>
            </div>
            <div class="result-item">
              <span class="result-label">Обновлено из ожидания</span>
              <span class="result-value" x-text="uploadResult.updatedFromPending"></span>
            </div>
          </div>
        </article>
      </template>
    </div>
  </template>
  </main>

  <!-- Rule Drawer -->
  <div class="drawer-backdrop" :class="{ 'open': ruleDrawer.open }" @click="closeRuleDrawer()" aria-hidden="true"></div>
  <aside class="drawer" :class="{ 'open': ruleDrawer.open }" role="dialog" aria-modal="true" aria-labelledby="rule-drawer-title" tabindex="-1" @keydown.escape.window="closeRuleDrawer()" x-trap="ruleDrawer.open">
    <header class="drawer-header">
      <h4 id="rule-drawer-title" x-text="ruleDrawer.mode === 'edit' ? 'Редактирование правила' : 'Новое правило'"></h4>
      <button class="secondary outline square small" @click="closeRuleDrawer()" aria-label="Закрыть">×</button>
    </header>
    <div class="drawer-content">
      <div class="rule-form">
        <p>
          <span><span class="warn">Если</span> в описании есть подстрока</span>
          <input type="text" x-model="ruleDrawer.rule.descriptionPattern" placeholder="Описание содержит...">
        </p>
        <p>
          <span>Сумма составляет от</span>
          <input type="number" x-model="ruleDrawer.rule.minAmount" placeholder="Мин. сумма">
          до
          <input type="number" x-model="ruleDrawer.rule.maxAmount" placeholder="Макс. сумма">
        </p>
        <p>
          <span>в валюте</span>
          <select x-model="ruleDrawer.rule.currency">
            <option value="">Любая валюта</option>
            <template x-for="cur in currencies" :key="cur">
              <option :value="cur" x-text="currencyLabel(cur)"></option>
            </template>
          </select>
        </p>
        <p>
          <span>Транзакция на счёте</span>
          <select x-model="ruleDrawer.rule.accountId">
            <option value="">Любой счёт</option>
            <template x-for="acc in accounts" :key="acc.id">
              <option :value="acc.id" x-text="accLabel(acc)"></option>
            </template>
          </select>
        </p>
        <hr>
        <p>
          <span><span class="warn">То</span> применить категорию</span>
          <select x-model="ruleDrawer.rule.categoryId">
            <option value="">Категория</option>
            <template x-for="cat in categories" :key="cat.id">
              <option :value="cat.id" x-text="cat.name"></option>
            </template>
          </select>
        </p>
        <p>
          <span>с приоритетом</span>
          <input type="number" x-model="ruleDrawer.rule.priority" placeholder="Приоритет">
        </p>
        <label class="checkbox-label">
          <input type="checkbox" x-model="ruleDrawer.rule.isActive"> Активно
        </label>
        <div class="drawer-actions">
          <button @click="saveCategoryRule()" :disabled="!ruleDrawer.rule.categoryId">Сохранить</button>
          <button class="outline" @click="closeRuleDrawer()">Отмена</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Account tooltip -->
  <div class="heatmap-tooltip" x-ref="accTooltip"></div>

  <!-- Drill-down Drawer -->
  <div class="drawer-backdrop" :class="{ 'open': drawer.open }" @click="closeDrawer()" aria-hidden="true"></div>
  <aside class="drawer" :class="{ 'open': drawer.open }" role="dialog" aria-modal="true" aria-labelledby="drawer-title" tabindex="-1" @keydown.escape.window="closeDrawer()" x-trap="drawer.open">
    <header class="drawer-header">
      <h4 id="drawer-title" x-text="drawer.title"></h4>
      <button class="secondary outline square small" @click="closeDrawer()" aria-label="Закрыть">×</button>
    </header>
    <div class="drawer-content">
      <div class="drawer-toolbar">
        <input type="text" x-model.debounce.300ms="drawerSearch" placeholder="Поиск по описанию..." class="drawer-search">
      </div>
      <figure class="data-table-wrap">
        <div class="data-table-scroll">
          <table role="grid" class="data-table drawer-table">
            <thead>
              <tr>
                <th @click="sortDrawer('tx_date')" class="sortable" :aria-sort="drawerSort.column === 'tx_date' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по дате">
                  Дата
                  <span x-show="drawerSort.column === 'tx_date'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
                <th @click="sortDrawer('description')" class="sortable" :aria-sort="drawerSort.column === 'description' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по описанию">
                  Описание
                  <span x-show="drawerSort.column === 'description'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
                <th class="text-right sortable" @click="sortDrawer('amount')" :aria-sort="drawerSort.column === 'amount' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по сумме">
                  Сумма
                  <span x-show="drawerSort.column === 'amount'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
                <th @click="sortDrawer('category')" class="sortable" :aria-sort="drawerSort.column === 'category' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по категории">
                  Категория
                  <span x-show="drawerSort.column === 'category'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
              </tr>
            </thead>
            <tbody>
              <template x-for="tx in sortedDrawerTransactions" :key="tx.id">
                <tr>
                  <td x-text="formatDate(tx.tx_date)" class="drawer-date-cell"></td>
                  <td x-text="tx.description"></td>
                  <td class="text-right" :class="tx.is_pending ? 'pending' : tx.tx_type" x-text="formatMoney(tx.amount, tx.currency)"></td>
                  <td>
                    <span class="category-badge" :style="'background-color: ' + (categoryMap[tx.category_id]?.color || '#555')" x-text="categoryMap[tx.category_id]?.name || '—'"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </figure>
      <template x-if="sortedDrawerTransactions.length === 0">
        <p class="empty-state">Нет транзакций</p>
      </template>
    </div>
  </aside>
  </div>
</body>

</html>
