<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Money Tracker — личный финансовый дашборд для отслеживания доходов, расходов и анализа транзакций.">
  <meta property="og:title" content="Money Tracker">
  <meta property="og:description" content="Личный финансовый дашборд для отслеживания доходов, расходов и анализа транзакций.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E◈%3C/text%3E%3C/svg%3E">
  <title>Money Tracker</title>
  <link rel="stylesheet" href="./vendor/pico.css" integrity="sha384-L1dWfspMTHU/ApYnFiMz2QID/PlP1xCW9visvBdbEkOLkSSWsP6ZJWhPw6apiXxU" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">
  <script defer src="./vendor/chart.js" integrity="sha384-hfkuqrKeWFmnTMWN31VWyoe8xgdTADD11kgxmdpx2uyE6j5Az5uZq6u6AKYYmAOw" crossorigin="anonymous"></script>
  <script defer src="./vendor/chartjs-plugin-datalabels.js" integrity="sha384-y49Zu59jZHJL/PLKgZPv3k2WI9c0Yp3pWB76V8OBVCb0QBKS8l4Ff3YslzHVX76Y" crossorigin="anonymous"></script>
  <script type="module" src="./app.js"></script>
  <script defer src="./vendor/alpine-focus.js" integrity="sha384-ysJcnHb6oCzqAGKdoTm+IqKqmPKgxHT+ApZCawkyWOJfMq15WvzW3RRmHl7tWpEY" crossorigin="anonymous"></script>
  <script defer src="./vendor/alpinejs.js" integrity="sha384-pb6hrQvo4s23cEUFtj0CZkzGE3jyK3pj26RIupXXxhSrrcUA/Cn0lZgcCrGH0t6L" crossorigin="anonymous"></script>
</head>

<body>
  <div x-data="app()" x-init="initApp()">
    <nav class="container-fluid">
      <ul>
        <li class="brand"><span class="logo">◈</span> <strong>Money Tracker</strong></li>
      </ul>
      <ul>
        <li><a href="#" @click.prevent="page='dashboard'" :class="{ 'active': page==='dashboard' }">Сводка</a></li>
        <li><a href="#" @click.prevent="page='transactions'" :class="{ 'active': page==='transactions' }">Транзакции</a></li>
        <li><a href="#" @click.prevent="page='categories'" :class="{ 'active': page==='categories' }">Категории</a></li>
        <li><a href="#" @click.prevent="page='upload'" :class="{ 'active': page==='upload' }">Загрузить</a></li>
      </ul>
    </nav>

    <main class="container">
      <div class="loading-overlay" x-show="isLoading" x-transition.opacity.duration.200ms>
        <span class="spinner" aria-label="Загрузка"></span>
      </div>
      <!-- Dashboard -->
      <template x-if="page === 'dashboard'">
        <div>
          <!-- Dashboard Filters -->
          <div class="dashboard-filters">
            <!-- Row 1: Date inputs + Period radios -->
            <div class="filter-row filter-row-dates">
              <input type="date" x-model="dashFilters.from" @change="onDashDateChange()" placeholder="От">
              <input type="date" x-model="dashFilters.to" @change="onDashDateChange()" placeholder="До">

              <label class="visually-hidden" for="dash-account">Счёт</label>
              <select id="dash-account" x-model="dashFilters.accountId" @change="loadDashboard()">
                <option value="">Все счета</option>
                <template x-for="acc in accounts" :key="acc.id">
                  <option :value="acc.id" x-text="acc.name || acc.account_number"></option>
                </template>
              </select>
              <div class="multi-select-wrap">
                <button type="button"
                  @click="toggleCategoryDropdown()"
                  :aria-expanded="categoryDropdownOpen"
                  aria-haspopup="true"
                  aria-controls="category-dropdown">
                  <span x-text="dashFilters.categoryIds.length ? `Категорий: ${dashFilters.categoryIds.length}` : 'Все категории'"></span>
                </button>
                <div id="category-dropdown" class="multi-select-dropdown" :class="{ 'open': categoryDropdownOpen }">
                  <template x-for="cat in categories" :key="cat.id">
                    <label class="multi-select-item">
                      <input type="checkbox" :value="cat.id" x-model="dashFilters.categoryIds" @change="loadDashboard()">
                      <span class="color-swatch small" :style="'background-color: ' + (cat.color || '#cccccc')"></span>
                      <span x-text="cat.name"></span>
                    </label>
                  </template>
                </div>
              </div>
              <button class="outline" @click="resetDashFilters()">Сбросить</button>

              <div class="period-radios" role="group">
                <label :class="{ 'active': dashFilters.period === 'month' }">
                  <input type="radio" value="month" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>Месяц</span>
                </label>
                <label :class="{ 'active': dashFilters.period === '3months' }">
                  <input type="radio" value="3months" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>3 месяца</span>
                </label>
                <label :class="{ 'active': dashFilters.period === 'all' }">
                  <input type="radio" value="all" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>Всё время</span>
                </label>
                <label :class="{ 'active': dashFilters.period === 'custom' }">
                  <input type="radio" value="custom" x-model="dashFilters.period" @change="applyDashPeriod()">
                  <span>Свой</span>
                </label>
              </div>
            </div>
          </div>

          <!-- KPI Cards -->
          <div class="grid kpi-cards">
            <article class="card-glow kpi-card" @click="toggleLineDataset('balance')">
              <header>
                <h5>Прибыль</h5>
              </header>
              <p class="big" :class="kpi.balance >= 0 ? 'income' : 'expense'" x-text="formatMoney(kpi.balance)"></p>
            </article>
            <article class="card-glow kpi-card" :class="{ 'income-border': !lineHidden.income }" @click="toggleLineDataset('income')">
              <header>
                <h5>Доходы</h5>
              </header>
              <p class="big income" x-text="formatMoney(kpi.income)"></p>
              <p class="kpi-delta" :class="kpi.incomeDelta >= 0 ? 'delta-positive' : 'delta-negative'">
                <span x-text="kpi.incomeDelta >= 0 ? '↑' : '↓'"></span>
                <span x-text="Math.abs(kpi.incomeDeltaPercent) + '%'"></span>
              </p>
              <p class="kpi-prev" x-show="kpi.prevPeriod" x-text="'в сравнении с ' + kpi.prevPeriod?.from + ' — ' + kpi.prevPeriod?.to"></p>
            </article>
            <article class="card-glow kpi-card" :class="{ 'expense-border': !lineHidden.expense }" @click="toggleLineDataset('expense')">
              <header>
                <h5>Расходы</h5>
              </header>
              <p class="big expense" x-text="formatMoney(kpi.expense)"></p>
              <p class="kpi-delta" :class="kpi.expenseDelta >= 0 ? 'delta-negative' : 'delta-positive'">
                <span x-text="kpi.expenseDelta >= 0 ? '↑' : '↓'"></span>
                <span x-text="Math.abs(kpi.expenseDeltaPercent) + '%'"></span>
              </p>
              <p class="kpi-prev" x-show="kpi.prevPeriod" x-text="'в сравнении с ' + formatDate(kpi.prevPeriod?.from) + ' — ' + formatDate(kpi.prevPeriod?.to)"></p>
            </article>
            <article class="card-glow kpi-card" @click="highlightTopCategory()">
              <header>
                <h5>Топ-категория</h5>
              </header>
              <p class="big expense" x-text="formatMoney(kpi.topCategory?.total || 0)"></p>
              <p class="kpi-label" x-text="kpi.topCategory?.name || '—'"></p>
            </article>
            <article class="card-glow kpi-card">
              <header>
                <h5>Операций</h5>
              </header>
              <p class="big" x-text="formatNum(kpi.transactionCount)"></p>
            </article>
          </div>

          <!-- Line Chart -->
          <article class="chart-card chart-card-wide">
            <header class="chart-header">
              <h5>Доходы и расходы</h5>
            </header>
            <div class="group-tabs" role="group">
              <button :class="{ 'active': groupBy === 'day' }" @click="setGroupBy('day')">Дни</button>
              <button :class="{ 'active': groupBy === 'week' }" @click="setGroupBy('week')">Недели</button>
              <button :class="{ 'active': groupBy === 'month' }" @click="setGroupBy('month')">Месяцы</button>
            </div>
            <div class="chart-wrap chart-wrap-tall"><canvas id="chart-income-expense"></canvas></div>
          </article>

          <!-- Doughnut + Heatmap Row -->
          <div class="grid charts-row">
            <article class="chart-card">
              <header>
                <h5>Расходы по категориям</h5>
              </header>
              <div class="chart-wrap"><canvas id="chart-categories"></canvas></div>
            </article>
            <article class="chart-card">
              <header class="chart-header">
                <h5>Тепловая карта</h5>
              </header>
              <div class="group-tabs" role="group">
                <button :class="{ 'active': heatmapMode === 'expense' }" @click="setHeatmapMode('expense')">Расходы</button>
                <button :class="{ 'active': heatmapMode === 'income' }" @click="setHeatmapMode('income')">Доходы</button>
                <button :class="{ 'active': heatmapMode === 'count' }" @click="setHeatmapMode('count')">Количество</button>
              </div>
              <div class="chart-wrap">
                <div id="heatmap-grid" class="heatmap-grid"></div>
              </div>
            </article>
          </div>

          <!-- Period Comparison Chart -->
          <article class="chart-card chart-card-wide">
            <header>
              <h5>Сравнение с предыдущим периодом</h5>
            </header>
            <div class="chart-wrap chart-wrap-tall"><canvas id="chart-comparison"></canvas></div>
          </article>
        </div>
      </template>

      <!-- Transactions -->
      <template x-if="page === 'transactions'">
        <div>
          <h3 class="page-title">Транзакции</h3>
          <div class="grid summary-cards">
            <article class="card-glow income-border">
              <header>
                <h4>Доходы (период)</h4>
              </header>
              <p class="big income" x-text="formatMoney(periodStats.income)"></p>
            </article>
            <article class="card-glow expense-border">
              <header>
                <h4>Расходы (период)</h4>
              </header>
              <p class="big expense" x-text="formatMoney(periodStats.expense)"></p>
            </article>
            <article class="card-glow">
              <header>
                <h4>Прибыль (период)</h4>
              </header>
              <p class="big" x-text="formatMoney((periodStats.income || 0) - (periodStats.expense || 0))"></p>
            </article>
          </div>
          <div class="filters grid">
            <input type="date" x-model="filters.from" @change="loadTransactions()" placeholder="От">
            <input type="date" x-model="filters.to" @change="loadTransactions()" placeholder="До">
            <select x-model="filters.accountId" @change="loadTransactions()">
              <option value="">Все счета</option>
              <template x-for="acc in accounts" :key="acc.id">
                <option :value="acc.id" x-text="acc.name || acc.account_number"></option>
              </template>
            </select>
            <select x-model="filters.categoryId" @change="loadTransactions()">
              <option value="">Все категории</option>
              <option value="null">Без категории</option>
              <template x-for="cat in categories" :key="cat.id">
                <option :value="cat.id" x-text="cat.name"></option>
              </template>
            </select>
            <input type="text" x-model.debounce.300ms="filters.search" @change="loadTransactions()" placeholder="Поиск по описанию...">
            <button class="secondary outline" @click="resetFilters()">Сбросить</button>
          </div>

          <div class="bulk-bar" x-show="selectedIds.length > 0">
            <span x-text="'Выбрано: ' + selectedIds.length"></span>
            <select x-model="bulkCategoryId">
              <option value="">Выберите категорию</option>
              <template x-for="cat in categories" :key="cat.id">
                <option :value="cat.id" x-text="cat.name"></option>
              </template>
            </select>
            <button @click="applyBulkCategory()" :disabled="!bulkCategoryId">Назначить</button>
          </div>

          <figure class="data-table-wrap">
            <table role="grid" class="data-table">
              <thead>
                <tr>
                  <th><input type="checkbox" @change="toggleSelectAll($event.target.checked)"></th>
                  <th>Дата</th>
                  <th>Описание</th>
                  <th>Сумма</th>
                  <th>Валюта</th>
                  <th>Счет</th>
                  <th>Категория</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="tx in transactions.rows" :key="tx.id">
                  <tr>
                    <td><input type="checkbox" :value="tx.id" x-model="selectedIds"></td>
                    <td x-text="formatDate(tx.tx_date)"></td>
                    <td x-text="tx.description"></td>
                    <td :class="tx.tx_type" x-text="formatMoney(tx.amount, tx.currency)"></td>
                    <td x-text="tx.currency"></td>
                    <td x-text="accountMap[tx.account_id]?.account_number || '#'+tx.account_id"></td>
                    <td>
                      <select x-model="tx.category_id" @change="updateTxCategory(tx.id, $event.target.value)">
                        <option value="">—</option>
                        <template x-for="cat in categories" :key="cat.id">
                          <option :value="cat.id" x-text="cat.name" :selected="cat.id == tx.category_id"></option>
                        </template>
                      </select>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </figure>

          <div class="pagination">
            <button class="outline" @click="prevPage()" :disabled="transactions.offset <= 0">← Назад</button>
            <span x-text="(transactions.offset||0)+1 + ' — ' + Math.min((transactions.offset||0)+(transactions.limit||50), transactions.total) + ' из ' + transactions.total"></span>
            <button class="outline" @click="nextPage()" :disabled="(transactions.offset||0)+(transactions.limit||50) >= transactions.total">Вперед →</button>
          </div>
        </div>
      </template>

      <!-- Categories -->
      <template x-if="page === 'categories'">
        <div>
          <h3 class="page-title">Категории</h3>
          <div class="category-form">
            <input type="text" x-model="newCategoryName" placeholder="Название новой категории">
            <div class="color-palette">
              <template x-for="c in categoryColors" :key="c.value">
                <button type="button" class="color-swatch" :class="{ 'active': newCategoryColor === c.value }" :style="'background-color: ' + c.value" :title="c.name" @click="newCategoryColor = c.value"></button>
              </template>
            </div>
            <button @click="addCategory()">Добавить</button>
          </div>
          <figure class="data-table-wrap category-table-wrap">
            <table role="grid" class="data-table category-table">
              <thead>
                <tr>
                  <th>Цвет</th>
                  <th>Название</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="cat in categories" :key="cat.id">
                  <tr>
                    <td>
                      <div class="color-palette">
                        <template x-for="c in categoryColors" :key="c.value">
                          <button type="button" class="color-swatch small" :class="{ 'active': (cat.color || '#cccccc') === c.value }" :style="'background-color: ' + c.value" :title="c.name" @click="updateCategoryColor(cat.id, c.value)"></button>
                        </template>
                      </div>
                    </td>
                    <td x-text="cat.name"></td>
                    <td><button class="secondary outline small" @click="deleteCategory(cat.id)">×</button></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </figure>
        </div>
      </template>

      <!-- Upload -->
      <template x-if="page === 'upload'">
        <div>
          <h3 class="page-title">Загрузка выписки</h3>
          <div class="dropzone" @dragover.prevent @drop.prevent="handleDrop($event)" @click="$refs.fileInput.click()">
            <p class="dropzone-icon">⬆</p>
            <p>Перетащите CSV-файл сюда или кликните для выбора</p>
            <input type="file" accept=".csv" x-ref="fileInput" @change="handleFileSelect($event)" class="hidden">
          </div>
          <template x-if="uploadResult">
            <article class="upload-result">
              <header>Результат импорта</header>
              <div class="grid result-grid">
                <div class="result-item">
                  <span class="result-label">Импортировано</span>
                  <span class="result-value" x-text="uploadResult.imported"></span>
                </div>
                <div class="result-item">
                  <span class="result-label">Пропущено дублей</span>
                  <span class="result-value" x-text="uploadResult.duplicatesSkipped"></span>
                </div>
                <div class="result-item">
                  <span class="result-label">Обновлено из ожидания</span>
                  <span class="result-value" x-text="uploadResult.updatedFromPending"></span>
                </div>
              </div>
            </article>
          </template>
        </div>
      </template>
    </main>

    <!-- Drill-down Drawer -->
    <div class="drawer-backdrop" :class="{ 'open': drawer.open }" @click="closeDrawer()" aria-hidden="true"></div>
    <aside
      class="drawer"
      :class="{ 'open': drawer.open }"
      role="dialog"
      aria-modal="true"
      aria-labelledby="drawer-title"
      tabindex="-1"
      @keydown.escape.window="closeDrawer()"
      x-trap="drawer.open">
      <header class="drawer-header">
        <h4 id="drawer-title" x-text="drawer.title"></h4>
        <button class="secondary outline small" @click="closeDrawer()" aria-label="Закрыть">×</button>
      </header>
      <div class="drawer-content">
        <div class="drawer-toolbar">
          <input type="text" x-model.debounce.300ms="drawerSearch" placeholder="Поиск по описанию..." class="drawer-search">
        </div>
        <figure class="data-table-wrap">
          <table role="grid" class="data-table drawer-table">
            <thead>
              <tr>
                <th @click="sortDrawer('tx_date')" class="sortable" :aria-sort="drawerSort.column === 'tx_date' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по дате">
                  Дата
                  <span x-show="drawerSort.column === 'tx_date'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
                <th @click="sortDrawer('description')" class="sortable" :aria-sort="drawerSort.column === 'description' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по описанию">
                  Описание
                  <span x-show="drawerSort.column === 'description'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
                <th class="text-right sortable" @click="sortDrawer('amount')" :aria-sort="drawerSort.column === 'amount' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по сумме">
                  Сумма
                  <span x-show="drawerSort.column === 'amount'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
                <th @click="sortDrawer('category')" class="sortable" :aria-sort="drawerSort.column === 'category' ? (drawerSort.direction === 'asc' ? 'ascending' : 'descending') : 'none'" aria-label="Сортировать по категории">
                  Категория
                  <span x-show="drawerSort.column === 'category'" x-text="drawerSort.direction === 'asc' ? '↑' : '↓'"></span>
                </th>
              </tr>
            </thead>
            <tbody>
              <template x-for="tx in sortedDrawerTransactions" :key="tx.id">
                <tr>
                  <td x-text="formatDate(tx.tx_date)" class="drawer-date-cell"></td>
                  <td x-text="tx.description"></td>
                  <td class="text-right" :class="tx.tx_type" x-text="formatMoney(tx.amount, tx.currency)"></td>
                  <td>
                    <span class="category-badge" :style="'background-color: ' + (categoryMap[tx.category_id]?.color || '#555')" x-text="categoryMap[tx.category_id]?.name || '—'"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </figure>
        <template x-if="sortedDrawerTransactions.length === 0">
          <p class="empty-state">Нет транзакций</p>
        </template>
      </div>
    </aside>
  </div>
</body>

</html>
